services:
  wbs:
    build: .
    restart: unless-stopped
    # SECRET_KEY / ADMIN_* / VERSION 등은 .env에 정의된 값이 컨테이너로 직접 주입된다.
    # .env에 없는 변수는 설정되지 않아 코드 기본값(app/config.py)이 사용된다.
    # ($\{VAR} 방식과 달리 미설정 변수가 빈 문자열로 덮어써지지 않는다.)
    # Coolify는 UI에 등록한 Environment Variables를 배포 시 .env로 생성한다.
    # required: false → .env가 없어도(로컬 신규 클론 등) 코드 기본값으로 기동된다.
    env_file:
      - path: .env
        required: false
    environment:
      # 런타임 고정값 — .env의 개발용 값(FLASK_ENV=development 등)을 덮어쓴다.
      FLASK_ENV: production
      HOST: 0.0.0.0
      PORT: 5000
      DATABASE_PATH: instance/wbs.db
      # 컨테이너 시간대를 한국시간으로 (스케줄러 발송시각·메일 표시·이력 시각 일관).
      # Dockerfile에서 tzdata 설치 + ENV TZ를 두지만, 여기서도 명시해 Coolify에서 가시화.
      TZ: Asia/Seoul
      # 메일 내 'WBS 바로가기' 링크의 운영 기본 URL (스케줄러/수동발송 공통).
      APP_BASE_URL: http://ru2ev5blwmk402ze2hmeidln.172.22.3.15.sslip.io
    volumes:
      # SQLite DB 영속화 — 재배포/재시작에도 데이터 유지
      - wbs-data:/app/instance
    ports:
      # Coolify 프록시가 도메인 → 5000 으로 라우팅한다.
      - "5000:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  wbs-data:
