<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 - WBS 관리 시스템</title>
<link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.png') }}">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-brand">
            <span class="landing-logo-brand">Easy WBS</span>
            <span class="landing-logo-credit">Provided by Claude</span>
        </div>
        <p class="auth-subtitle">로그인</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" id="email" name="email" required placeholder="이메일을 입력하세요" autofocus>
            </div>
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" required placeholder="비밀번호를 입력하세요">
            </div>
            <button type="submit" class="btn btn-primary auth-btn">로그인</button>
        </form>
        <p class="auth-link">계정이 없으신가요? <a href="/register">회원가입</a></p>
    </div>
</div>
</body>
</html>
